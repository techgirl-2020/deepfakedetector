<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FakeSight — See Through the Lie</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0c10;
    --surface: #13151c;
    --card: #1a1d28;
    --border: rgba(255,255,255,0.08);
    --accent: #c8f542;
    --accent2: #7b5ea7;
    --text: #f0f0e8;
    --muted: #888880;
    --danger: #ff4d6d;
    --safe: #c8f542;
    --radius: 14px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  [data-theme="light"] {
    --bg: #f5f4ee;
    --surface: #eceae1;
    --card: #ffffff;
    --border: rgba(0,0,0,0.1);
    --accent: #5a8a00;
    --accent2: #6b4d9e;
    --text: #1a1a14;
    --muted: #5f5e58;
    --danger: #c9213e;
    --safe: #4a7200;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background var(--transition), color var(--transition);
    overflow-x: hidden;
  }

  /* PARTICLE CANVAS */
  #particleCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  .theme-btn {
    position: fixed; top: 1.5rem; right: 1.5rem; z-index: 100;
    width: 52px; height: 28px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    cursor: pointer;
    display: flex; align-items: center; padding: 3px;
    transition: background var(--transition), border var(--transition);
  }
  .theme-btn-knob {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    transition: transform var(--transition), background var(--transition);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }
  [data-theme="light"] .theme-btn-knob { transform: translateX(24px); }

  .page {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem 1rem;
  }

  .logo-area {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 3rem;
    animation: fadeUp 0.7s ease both;
  }

  /* EYE CONTAINER */
  .eye-wrap {
    width: 88px; height: 88px;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .eye-wrap svg { width: 100%; height: 100%; }

  .eye-glow {
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,245,66,0.1) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes pulse-glow {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .eye-wrap.blink svg {
    animation: blink-eye 0.12s ease;
  }
  @keyframes blink-eye {
    0% { transform: scaleY(1); }
    50% { transform: scaleY(0.05); }
    100% { transform: scaleY(1); }
  }

  .scan-line {
    animation: scan 2.5s ease-in-out infinite;
  }
  @keyframes scan {
    0% { transform: translateY(-8px); opacity: 0; }
    30% { opacity: 0.7; }
    70% { opacity: 0.7; }
    100% { transform: translateY(8px); opacity: 0; }
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.4rem, 6vw, 3.4rem);
    letter-spacing: -0.03em;
    line-height: 1;
    color: var(--text);
  }
  .brand span { color: var(--accent); }

  .tagline {
    margin-top: 0.5rem;
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-style: italic;
  }

  .welcome-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    width: 100%; max-width: 420px;
    animation: fadeUp 0.9s ease both;
    position: relative;
    overflow: hidden;
  }
  .welcome-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  .welcome-msg {
    text-align: center;
    margin-bottom: 2rem;
  }
  .welcome-msg h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 1.35rem;
    margin-bottom: 0.5rem;
    color: var(--text);
  }
  .welcome-msg p {
    font-size: 0.88rem;
    color: var(--muted);
    font-weight: 300;
    line-height: 1.6;
  }
  .welcome-msg p strong { color: var(--accent); font-weight: 500; }

  .form-alert {
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 500;
    margin-bottom: 1rem;
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.2);
    color: var(--danger);
    display: none;
  }
  .form-alert.success {
    background: rgba(200,245,66,0.08);
    border-color: rgba(200,245,66,0.2);
    color: var(--accent);
  }
  .form-alert.show { display: block; }

  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .form-group input {
    width: 100%;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    transition: border var(--transition), box-shadow var(--transition);
    outline: none;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,245,66,0.12);
  }
  [data-theme="light"] .form-group input:focus {
    box-shadow: 0 0 0 3px rgba(90,138,0,0.12);
  }

  .btn-primary {
    width: 100%;
    padding: 0.85rem;
    background: var(--accent);
    color: #0b0c10;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.02em;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: transform 0.15s ease, opacity 0.15s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active:not(:disabled) { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-loader {
    width: 14px; height: 14px;
    border: 2px solid rgba(11,12,16,0.3);
    border-top-color: #0b0c10;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn-primary.loading .btn-loader { display: inline-block; }
  .btn-primary.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .divider {
    display: flex; align-items: center; gap: 0.75rem;
    margin: 1.25rem 0;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  .btn-ghost {
    width: 100%;
    padding: 0.75rem;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border var(--transition), background var(--transition);
  }
  .btn-ghost:hover { border-color: var(--accent); background: var(--surface); }

  .hint {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .hint a { color: var(--accent); text-decoration: none; font-weight: 500; }

  .stats-row {
    display: flex; gap: 1.5rem;
    margin-top: 2.5rem;
    animation: fadeUp 1.1s ease both;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--accent);
  }
  .stat-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
    margin-top: 0.15rem;
  }
  .stat-sep { width: 1px; background: var(--border); align-self: stretch; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tab-row {
    display: flex; gap: 0; margin-bottom: 1.5rem;
    background: var(--surface);
    border-radius: 8px;
    padding: 3px;
  }
  .tab {
    flex: 1; padding: 0.55rem;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    transition: background var(--transition), color var(--transition);
    color: var(--muted);
    border: none;
    background: transparent;
  }
  .tab.active {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .form-panel { display: none; }
  .form-panel.active { display: block; }
  /* ===== CINEMATIC PREMIUM UPGRADE ===== */

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(200,245,66,0.06), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(123,94,167,0.08), transparent 32%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.03), transparent 28%);
  z-index: 0;
  pointer-events: none;
  animation: ambientMove 14s ease-in-out infinite alternate;
}

@keyframes ambientMove {
  0% { transform: scale(1) translateY(0); }
  100% { transform: scale(1.08) translateY(-12px); }
}

.welcome-card {
  backdrop-filter: blur(18px);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.38),
    0 0 0 1px rgba(255,255,255,0.02);
  transition: transform 0.35s ease, box-shadow 0.35s ease;
}

.welcome-card:hover {
  transform: translateY(-6px);
  box-shadow:
    0 28px 70px rgba(0,0,0,0.48),
    0 0 25px rgba(200,245,66,0.06);
}

.brand {
  animation: titleReveal 1.1s ease both;
}

@keyframes titleReveal {
  from {
    opacity: 0;
    transform: translateY(16px) scale(0.96);
    letter-spacing: 0.08em;
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    letter-spacing: normal;
  }
}

.btn-primary {
  box-shadow: 0 10px 28px rgba(200,245,66,0.22);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px) scale(1.01);
  box-shadow: 0 18px 38px rgba(200,245,66,0.28);
}

.btn-ghost:hover {
  transform: translateY(-2px);
}

.stat {
  transition: transform 0.25s ease;
}

.stat:hover {
  transform: translateY(-4px);
}

.eye-wrap {
  animation: floatEye 4s ease-in-out infinite;
}

@keyframes floatEye {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

.page {
  animation: fadeUp 0.8s ease;
}
.tagline {
  min-height: 22px;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.tagline.fade-out {
  opacity: 0;
  transform: translateY(6px);
}

.tagline.fade-in {
  opacity: 1;
  transform: translateY(0);
}

@keyframes blinkCursor {
  0%,50% { opacity: 1; }
  51%,100% { opacity: 0; }
}
.reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.reveal.show {
  opacity: 1;
  transform: translateY(0);
}
</style>
</head>
<body data-theme="dark">

<canvas id="particleCanvas"></canvas>
<div class="noise"></div>

<button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">
  <div class="theme-btn-knob" id="knob">☽</div>
</button>

<div class="page">
  <div class="logo-area reveal">

    <!-- ANIMATED EYE -->
    <div class="eye-wrap" id="eyeWrap">
      <div class="eye-glow"></div>
      <svg id="eyeSvg" viewBox="0 0 88 88" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="44" cy="44" r="42" fill="#1a1d28" stroke="rgba(200,245,66,0.25)" stroke-width="1.5"/>
        <circle cx="44" cy="44" r="32" fill="#13151c"/>
        <ellipse cx="44" cy="44" rx="22" ry="14" fill="none" stroke="#c8f542" stroke-width="1.8"/>
        <circle id="eyeIris" cx="44" cy="44" r="9" fill="#c8f542" opacity="0.15"/>
        <circle id="eyePupil" cx="44" cy="44" r="6" fill="#c8f542"/>
        <circle id="eyeShine" cx="46.5" cy="41.5" r="2" fill="#0b0c10"/>
        <circle id="eyeReflect" cx="43" cy="46" r="1" fill="#c8f542" opacity="0.4"/>
        <line class="scan-line" x1="22" y1="44" x2="66" y2="44" stroke="#c8f542" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.6"/>
        <path d="M 30 28 Q 44 18 58 28" stroke="#7b5ea7" stroke-width="1.2" fill="none" opacity="0.7"/>
        <path d="M 26 34 Q 32 26 38 30" stroke="#7b5ea7" stroke-width="1" fill="none" opacity="0.5"/>
        <circle cx="44" cy="44" r="42" fill="none" stroke="rgba(123,94,167,0.15)" stroke-width="6"/>
        <path d="M 18 44 Q 18 30 30 22" stroke="#c8f542" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="2 3"/>
        <path d="M 70 44 Q 70 30 58 22" stroke="#c8f542" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="2 3"/>
      </svg>
    </div>

    <div class="brand">
     <div class="brand">Fake<span>Sight</span></div><span>Sight</span>
    </div>
    <div class="tagline">See through the lie</div>
  </div>

  <div class="welcome-card reveal">
    <div class="welcome-msg">
      <h2>Welcome, truth-seeker.</h2>
      <p>
        You're about to enter a space where <strong>AI meets reality</strong>.<br>
        FakeSight detects deepfakes so you never have to guess again.
      </p>
    </div>

    <div class="tab-row">
      <button class="tab active" onclick="switchTab('login', this)">Sign in</button>
      <button class="tab" onclick="switchTab('register', this)">Register</button>
    </div>

    <!-- LOGIN PANEL -->
    <div class="form-panel active" id="panel-login">
      <div class="form-alert" id="login-error"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
        <span class="btn-text">Enter FakeSight</span>
        <span class="btn-loader"></span>
      </button>
    </div>

    <!-- REGISTER PANEL -->
    <div class="form-panel" id="panel-register">
      <div class="form-alert" id="register-error"></div>
      <div class="form-alert success" id="register-success"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="investigator_42" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@mail.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Choose a strong password" autocomplete="new-password"/>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="reg-password2" placeholder="••••••••" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" id="registerBtn" onclick="handleRegister()">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader"></span>
      </button>
    </div>

    <div class="hint">
      By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
    </div>
  </div>

  <div class="stats-row reveal">
    <div class="stat">
      <div class="stat-num">98.4%</div>
      <div class="stat-label">Accuracy</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-num">1.2M+</div>
      <div class="stat-label">Files Scanned</div>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <div class="stat-num">&lt;2s</div>
      <div class="stat-label">Avg. Response</div>
    </div>
  </div>
</div>

<script src="js/app.js?v=3"></script>


</body>
</html>
