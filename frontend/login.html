<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FakeSight — Enter</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-body">

  <canvas id="particleCanvas"></canvas>

  <div class="login-wrap">

    <div class="login-left">
      <div class="eye-container" id="eyeContainer">
        <svg class="eye-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="96" fill="url(#eye-bg)" stroke="url(#eye-ring)" stroke-width="1"/>
          <ellipse cx="100" cy="100" rx="70" ry="44" fill="none" stroke="url(#lash-g)" stroke-width="1.5"/>
          <circle class="iris" cx="100" cy="100" r="28" fill="url(#iris-g)"/>
          <circle class="pupil" cx="100" cy="100" r="14" fill="#050508"/>
          <circle class="shine" cx="108" cy="92" r="6" fill="white" opacity="0.9"/>
          <circle cx="94" cy="108" r="2.5" fill="white" opacity="0.3"/>
          <line class="scan" x1="30" y1="100" x2="170" y2="100" stroke="url(#lash-g)" stroke-width="0.8" stroke-dasharray="4 5" opacity="0.5"/>
          <path d="M 30 100 Q 100 56 170 100" stroke="url(#lash-g)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M 30 100 Q 100 144 170 100" stroke="url(#lash-g)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
          <path d="M 42 78 L 36 66" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M 58 64 L 54 52" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M 78 58 L 76 45" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M 100 56 L 100 42" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M 122 58 L 124 45" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M 142 64 L 146 52" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M 158 78 L 164 66" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="100" cy="100" r="96" fill="none" stroke="url(#outer-ring)" stroke-width="0.5" opacity="0.5"/>
          <defs>
            <radialGradient id="eye-bg" cx="50%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#1a1c2e"/>
              <stop offset="100%" stop-color="#080910"/>
            </radialGradient>
            <linearGradient id="eye-ring" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#22d3a5" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.4"/>
            </linearGradient>
            <linearGradient id="lash-g" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#22d3a5"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
            <radialGradient id="iris-g" cx="40%" cy="40%" r="60%">
              <stop offset="0%" stop-color="#22d3a5"/>
              <stop offset="50%" stop-color="#0d9e7a"/>
              <stop offset="100%" stop-color="#050508"/>
            </radialGradient>
            <linearGradient id="outer-ring" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#22d3a5"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="eye-glow"></div>
      </div>

      <div class="brand-block">
        <div class="brand-name glitch" data-text="FakeSight">
          <span class="brand-f">Fake</span><span class="brand-s">Sight</span>
        </div>
        <div class="brand-tagline">Where Truth Has Eyes</div>
      </div>

      <div class="left-stats">
        <div class="ls-item">
          <div class="ls-val">98.7%</div>
          <div class="ls-label">Accuracy</div>
        </div>
        <div class="ls-sep"></div>
        <div class="ls-item">
          <div class="ls-val">&lt;1.5s</div>
          <div class="ls-label">Analysis</div>
        </div>
        <div class="ls-sep"></div>
        <div class="ls-item">
          <div class="ls-val">AI</div>
          <div class="ls-label">Powered</div>
        </div>
      </div>
    </div>

    <div class="login-right">
      <div class="auth-card">

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" data-tab="register" onclick="switchTab('register')">Register</button>
          <div class="tab-indicator" id="tabIndicator"></div>
        </div>

        <div class="auth-panel" id="panel-login">
          <div class="panel-head">
            <h2>Good to see you back.</h2>
            <p>Sign in to continue your investigation.</p>
          </div>
          <div class="form-alert hidden" id="login-error"></div>
          <div class="form-field">
            <label>Username</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              <input type="text" id="login-username" placeholder="your_username" autocomplete="username"/>
            </div>
          </div>
          <div class="form-field">
            <label>Password</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
              <button class="pw-toggle" type="button" onclick="togglePw('login-password', this)">
                <svg viewBox="0 0 20 20" fill="none"><ellipse cx="10" cy="10" rx="7" ry="5" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.4"/></svg>
              </button>
            </div>
          </div>
          <button class="btn-primary" onclick="handleLogin(event)">
            <span class="btn-text">Enter FakeSight</span>
            <span class="btn-loader hidden"></span>
          </button>
        </div>

        <div class="auth-panel hidden" id="panel-register">
          <div class="panel-head">
            <h2>Join the investigation.</h2>
            <p>Create your account to start detecting deepfakes.</p>
          </div>
          <div class="form-alert hidden" id="register-error"></div>
          <div class="form-alert success hidden" id="register-success"></div>
          <div class="form-field">
            <label>Username</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 17c0-3.3 3.1-6 7-6s7 2.7 7 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              <input type="text" id="reg-username" placeholder="investigator_42" autocomplete="username"/>
            </div>
          </div>
          <div class="form-field">
            <label>Email</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M3 7l7 5 7-5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              <input type="email" id="reg-email" placeholder="you@domain.com" autocomplete="email"/>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label>Password</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 9V6.5a3 3 0 0 1 6 0V9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password"/>
              </div>
            </div>
            <div class="form-field">
              <label>Confirm</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 20 20" fill="none"><path d="M5 10l4 4 6-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <input type="password" id="reg-password2" placeholder="••••••••" autocomplete="new-password"/>
              </div>
            </div>
          </div>
          <button class="btn-primary" onclick="handleRegister(event)">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader hidden"></span>
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // Eye follows mouse
    const eyeContainer = document.getElementById('eyeContainer');
    const iris = document.querySelector('.iris');
    const pupil = document.querySelector('.pupil');
    const shine = document.querySelector('.shine');

    document.addEventListener('mousemove', (e) => {
      const rect = eyeContainer.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxMove = 12;
      const nx = (dx / Math.max(dist, 1)) * Math.min(dist * 0.1, maxMove);
      const ny = (dy / Math.max(dist, 1)) * Math.min(dist * 0.1, maxMove);
      
      // Validate coordinates are valid numbers
      if (isNaN(nx) || isNaN(ny) || !isFinite(nx) || !isFinite(ny)) {
        console.debug('[FakeSight] Invalid eye coordinates, skipping update', { nx, ny });
        return;
      }
      
      iris.setAttribute('cx', 100 + nx);
      iris.setAttribute('cy', 100 + ny);
      pupil.setAttribute('cx', 100 + nx * 1.2);
      pupil.setAttribute('cy', 100 + ny * 1.2);
      shine.setAttribute('cx', 108 + nx);
      shine.setAttribute('cy', 92 + ny);
    });

    // Blink animation
    setInterval(() => {
      eyeContainer.classList.add('blink');
      setTimeout(() => eyeContainer.classList.remove('blink'), 200);
    }, 4000 + Math.random() * 3000);

    // Particle canvas
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = Array.from({length: 60}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      opacity: Math.random() * 0.4 + 0.1,
      color: Math.random() > 0.5 ? '34,211,165' : '167,139,250'
    }));

    function animParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.color},${p.opacity})`;
        ctx.fill();
      });
      requestAnimationFrame(animParticles);
    }
    animParticles();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Tab switching
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.getElementById('panel-login').classList.toggle('hidden', tab !== 'login');
      document.getElementById('panel-register').classList.toggle('hidden', tab !== 'register');
      document.getElementById('tabIndicator').style.transform = tab === 'login' ? 'translateX(0)' : 'translateX(100%)';
    }

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.classList.toggle('active');
    }

    async function handleLogin(e) {
      const btn = e.currentTarget;
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      if (!username || !password) { showAlert(errorEl, 'Please fill in all fields.'); return; }

      setLoading(btn, true);
      hideAlert(errorEl);
      try {
        const res = await api.login(username, password);
        localStorage.setItem('access', res.tokens.access);
        localStorage.setItem('refresh', res.tokens.refresh);
        localStorage.setItem('user', JSON.stringify(res.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        showAlert(errorEl, err.message || 'Login failed.');
      } finally {
        setLoading(btn, false);
      }
    }

    async function handleRegister(e) {
      const btn = e.currentTarget;
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;
      const errorEl = document.getElementById('register-error');
      const successEl = document.getElementById('register-success');

      if (!username || !email || !password || !password2) { showAlert(errorEl, 'All fields required.'); return; }
      if (password !== password2) { showAlert(errorEl, 'Passwords do not match.'); return; }
      if (password.length < 8) { showAlert(errorEl, 'Password must be at least 8 characters.'); return; }

      setLoading(btn, true);
      hideAlert(errorEl); hideAlert(successEl);
      try {
        const res = await api.register(username, email, password, password2);
        localStorage.setItem('access', res.tokens.access);
        localStorage.setItem('refresh', res.tokens.refresh);
        localStorage.setItem('user', JSON.stringify(res.user));
        showAlert(successEl, 'Account created! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch (err) {
        showAlert(errorEl, err.message || 'Registration failed.');
      } finally {
        setLoading(btn, false);
      }
    }

    function showAlert(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }
    function hideAlert(el) { el.classList.add('hidden'); }
    function setLoading(btn, state) {
      btn.querySelector('.btn-text').classList.toggle('hidden', state);
      btn.querySelector('.btn-loader').classList.toggle('hidden', !state);
      btn.disabled = state;
    }
  </script>
</body>
</html>
